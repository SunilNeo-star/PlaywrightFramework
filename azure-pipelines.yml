trigger:
  branches:
    include:
      - main
      - master

pool:
  vmImage: ubuntu-latest

steps:
  - task: UseDotNet@2
    displayName: 'Install .NET'
    inputs:
      packageType: sdk
      version: '10.0.x'

  - script: dotnet restore PlaywrightFramework.Tests/PlaywrightFramework.Tests.csproj
    displayName: 'Restore dependencies'

  - script: dotnet build PlaywrightFramework.Tests/PlaywrightFramework.Tests.csproj --no-restore
    displayName: 'Build'

  - script: pwsh PlaywrightFramework.Tests/bin/Debug/net10.0/playwright.ps1 install --with-deps chromium
    displayName: 'Install Playwright browsers'

  - script: dotnet test PlaywrightFramework.Tests/PlaywrightFramework.Tests.csproj --logger "trx;LogFileName=TestResults.trx" --results-directory TestResults
    displayName: 'Run Playwright tests'
    env:
      CI: 'true'
      GITHUB_TOKEN: $(GITHUB_TOKEN)
  - task: PublishTestResults@2
    displayName: 'Publish test results'
    condition: always()
    inputs:
      testResultsFormat: VSTest
      testResultsFiles: 'TestResults/**/*.trx'